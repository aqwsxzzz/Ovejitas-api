
services:
    app:
        build:
            context: .
            target: dev
        container_name: fastify-app
        volumes:
            - ./:/app
            - /app/node_modules
            - /app/build
        ports:
            - "${PORT:-8081}:${PORT:-8081}"
        env_file:
            - ./.env
        environment:
            NODE_ENV: development
            DB_HOST: postgres
            DB_PORT: 5432
        depends_on:
            - postgres
        command: sh ./entrypoint.sh

    postgres:
        image: postgres:14-alpine
        container_name: fastify-postgres
        ports:
            - "${DB_PORT:-5436}:5432"
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASS}
            - POSTGRES_DB=${DB_NAME}
        volumes:
            - postgres-data:/var/lib/postgresql/data

volumes:
    postgres-data:
